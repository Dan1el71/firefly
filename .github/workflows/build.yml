name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate SonarQube blame data

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath, curl, fileinfo, iconv, intl, mbstring, openssl, pdo, pdo_sqlite, sodium, tokenizer, xml, xmlwriter, simplexml, dom
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare environment
        run: |
          printf '%s\n' \
            'APP_ENV=testing' \
            'APP_KEY=base64:dGhpc2lzYXRlc3RrZXkxMjM0NTY3ODkwMTI=' \
            'APP_DEBUG=true' \
            'DB_CONNECTION=sqlite' \
            'DB_DATABASE=' \
            'LOG_CHANNEL=stack' \
            'APP_LOG_LEVEL=notice' \
            'AUDIT_LOG_LEVEL=emergency' \
            > .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run unit tests with coverage
        run: |
          php vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite unit \
            --coverage-clover=coverage.xml \
            --log-junit=test-report.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            test-report.xml

  sonarqube:
    name: SonarQube Analysis
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate SonarQube blame data

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
