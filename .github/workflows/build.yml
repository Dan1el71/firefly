name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate SonarQube blame data

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath, curl, fileinfo, iconv, intl, mbstring, openssl, pdo, pdo_sqlite, sodium, tokenizer, xml, xmlwriter, simplexml, dom
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare environment
        run: |
          printf '%s\n' \
            'APP_ENV=testing' \
            'APP_KEY=base64:dGhpc2lzYXRlc3RrZXkxMjM0NTY3ODkwMTI=' \
            'APP_DEBUG=true' \
            'DB_CONNECTION=sqlite' \
            'DB_DATABASE=:memory:' \
            'LOG_CHANNEL=stack' \
            'APP_LOG_LEVEL=notice' \
            'AUDIT_LOG_LEVEL=emergency' \
            > .env
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/logs
          mkdir -p storage/database
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Install Composer dependencies
        env:
          COMPOSER_NO_SCRIPTS: '1'
        run: |
          composer install --no-interaction --no-progress --prefer-dist --no-scripts --no-autoloader
          composer dump-autoload --no-scripts

      - name: Run unit tests with coverage
        run: |
          php vendor/bin/phpunit \
            --configuration phpunit.xml \
            --testsuite unit \
            --coverage-clover=coverage.xml \
            --log-junit=test-report.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            test-report.xml
  sonarqube:
    name: SonarQube Analysis
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate SonarQube blame data

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Dan1el71_firefly
            -Dsonar.projectName=Firefly III
            -Dsonar.sources=.
            -Dsonar.php.coverage.reportPaths=coverage.xml
