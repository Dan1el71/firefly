# SonarQube project configuration for Firefly III
sonar.projectKey=firefly-iii
sonar.projectName=Firefly III
sonar.projectVersion=6.5.3
sonar.organization=dan1el71

# Source and test directories
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Language
sonar.language=php

# PHP coverage and test reports
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPaths=test-report.xml

# Exclusions - skip vendor, storage, cached files, compiled assets
sonar.exclusions=vendor/**,storage/**,bootstrap/cache/**,public/build/**,public/v1/**,public/v2/**,resources/views/**,node_modules/**
sonar.test.exclusions=vendor/**


